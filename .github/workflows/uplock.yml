name: Update package-lock.json

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Check Out
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Generate package-lock.json
      run: |
        # 如果你的项目是 scratch-gui 这种结构，确保在正确的文件夹下执行
        # 如果是根目录直接执行：
        npm install --package-lock-only --ignore-scripts

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 核心更正 1：强制只添加 package-lock.json，忽略 node_modules 下的临时文件
        git add package-lock.json
        
        # 核心更正 2：使用 git diff-index 检查已暂存的 (staged) 文件是否有变化
        # 这样可以精准避开 untracked 干扰
        if ! git diff-index --quiet HEAD --; then
          echo "检测到 package-lock.json 变化，正在提交..."
          git commit -m "chore: 自动更新 package-lock.json [skip ci]"
          git push origin HEAD:main
        else
          echo "文件无变化，跳过提交。"
        fi
